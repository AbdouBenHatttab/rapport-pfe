<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Participant Diagram Preview</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
    }
    .card {
      max-width: 1320px;
      margin: 0 auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    img {
      width: 100%;
      height: auto;
      display: block;
    }
    p {
      margin: 12px 4px 0;
      color: #444;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="participant_registration_new_user.svg" alt="Participant class diagram preview">
    <p>SVG file can be imported directly into draw.io.</p>
  </div>
</body>
</html>
